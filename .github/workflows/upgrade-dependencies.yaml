name: Create Upgrade-Pull-Requests
on:
  schedule:
    - cron: '*/11 * * * *'
  workflow_dispatch:

jobs:
  upgrade-pullrequests:
    uses: gardener/cc-utils/.github/workflows/upgrade-dependencies.yaml@v1
    permissions:
      contents: read
      id-token: write
    with:
      merge-policy: automerge
      merge-method: squash
