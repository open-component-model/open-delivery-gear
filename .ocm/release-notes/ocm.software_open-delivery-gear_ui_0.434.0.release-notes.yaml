ocm:
  component_name: ocm.software/open-delivery-gear/ui
  component_version: 0.434.0
release_notes:
- audience: developer
  author:
    hostname: github.com
    type: githubUser
    username: 8R0WNI3
  category: fix
  contents: The `version` property (if present) is now purged from the extra identity
    in case the `artefact` scope is used
  mimetype: text/markdown
  reference: '[#469](https://github.com/open-component-model/odg-ui/pull/469)'
  type: standard
- audience: user
  author:
    hostname: github.com
    type: githubUser
    username: 8R0WNI3
  category: breaking
  contents: The latest rescoring is now always also the effective one (the specificity
    is not considered anymore)
  mimetype: text/markdown
  reference: '[#469](https://github.com/open-component-model/odg-ui/pull/469)'
  type: standard
- audience: developer
  author:
    hostname: github.com
    type: githubUser
    username: 8R0WNI3
  category: other
  contents: An empty artefact kind and/or type is now also supported for the `component`
    and `global` scopes
  mimetype: text/markdown
  reference: '[#469](https://github.com/open-component-model/odg-ui/pull/469)'
  type: standard
- audience: user
  author:
    hostname: github.com
    type: githubUser
    username: 8R0WNI3
  category: breaking
  contents: The `artefact` scope will now restrict the rescoring to the exact artefact
    (ignoring its version). Previously, it was applied to all artefacts sharing the
    same name and type.
  mimetype: text/markdown
  reference: '[#469](https://github.com/open-component-model/odg-ui/pull/469)'
  type: standard
